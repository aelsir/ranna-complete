<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1b4144" />
    <link rel="icon" type="image/png" href="/logo-ranna.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>رنّة - للمدائح النبوية</title>
    <meta
      name="description"
      content="رنّة - منصة للمدائح النبوية والأذكار السودانية"
    />
    <!-- Font loading: preconnect + preload + swap for reliability -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the font CSS so it starts downloading immediately -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fustat:wght@400;600;700;800&family=Noto+Naskh+Arabic:wght@400;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fustat:wght@400;600;700;800&family=Noto+Naskh+Arabic:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Inline fallback: ensure font-family is declared even before external CSS loads -->
    <style>
      body {
        font-family: "Noto Naskh Arabic", "Arial", serif;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .font-fustat {
        font-family: "Fustat", "Arial", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
