name: ranna
description: "Ranna - Islamic praise music streaming app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^13.2.0
  supabase_flutter: ^2.3.4
  flutter_riverpod: ^2.4.10
  url_launcher: ^6.2.5

  # Audio
  just_audio: ^0.9.37
  audio_service: ^0.18.13
  audio_session: ^0.1.19

  # UI
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
