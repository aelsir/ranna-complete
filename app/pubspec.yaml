name: ranna
description: "Ranna - Islamic praise music streaming app"
publish_to: 'none'
version: 3.7.0+26

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^13.2.0
  supabase_flutter: ^2.3.4
  flutter_riverpod: ^2.4.10
  url_launcher: ^6.2.5

  # Audio
  just_audio: ^0.9.37
  audio_service: ^0.18.13
  audio_session: ^0.1.19

  # Storage
  shared_preferences: ^2.5.4

  # Sharing
  share_plus: ^10.0.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  path_provider: ^2.1.5
  dio: ^5.9.2
  connectivity_plus: ^7.1.0
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_cache_manager: ^3.4.1
  sentry_flutter: ^9.16.0
  hijri: ^3.0.0
  mixpanel_flutter: ^2.3.0
  mixpanel_flutter_session_replay: ^0.1.0-beta.4

  # Native OAuth (Google + Apple). On iOS/Android we use the native SDKs and
  # exchange the resulting ID token via `supabase.auth.signInWithIdToken` for a
  # better UX (no Safari View Controller round-trip). On web/desktop we fall
  # back to `signInWithOAuth` browser flow.
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # SVG rendering — used by the OAuth button row to render the official
  # Google + Apple brand marks from shared/icons.
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ranna-white-background.png"
  web:
    generate: true
    image_path: "assets/images/ranna-white-background.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/


  fonts:
    # ── Active fonts (AMOLED theme) ──
    # Kufam = display / headers / titles. ReadexPro = body / subtitles / captions.
    - family: Kufam
      fonts:
        - asset: assets/fonts/Kufam-Regular.ttf
          weight: 400
        - asset: assets/fonts/Kufam-Medium.ttf
          weight: 500
        - asset: assets/fonts/Kufam-Bold.ttf
          weight: 700
        - asset: assets/fonts/Kufam-Italic.ttf
          weight: 400
          style: italic
    - family: ReadexPro
      fonts:
        - asset: assets/fonts/ReadexPro-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/ReadexPro-Light.ttf
          weight: 300
        - asset: assets/fonts/ReadexPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/ReadexPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/ReadexPro-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/ReadexPro-Bold.ttf
          weight: 700
    # ── Legacy fonts (kept declared so any straggler `fontFamily: 'Fustat'`
    # string literal still loads instead of falling back to default; the
    # active theme tokens point at Kufam/ReadexPro). Safe to remove once
    # the codebase is fully migrated to the token names.
    - family: Fustat
      fonts:
        - asset: assets/fonts/Fustat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Fustat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fustat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Fustat-ExtraBold.ttf
          weight: 800
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700
